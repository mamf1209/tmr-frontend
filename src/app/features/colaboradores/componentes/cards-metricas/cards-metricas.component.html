<div class="metricas">

  <!-- Card 1: No asignados / Asignados -->
  <div class="metricas__card">
    <div class="metricas__card-content">
      <div class="metricas__top">
        <svg class="metricas__icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
          <path d="M5 5L19 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="metricas__numero">
          {{ mostrandoAsignados ? asignados : noAsignados }}
        </span>
      </div>
      <span class="metricas__label">
        {{ mostrandoAsignados ? 'Asignados' : 'No asignados' }}
      </span>
    </div>
    <button
      class="metricas__filter-btn"
      (click)="toggleAsignados()"
      [title]="mostrandoAsignados ? 'Ver no asignados' : 'Ver asignados'"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M3 6h18M7 12h10M11 18h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Card 2: Inactivos / Activos -->
  <div class="metricas__card">
    <div class="metricas__card-content">
      <div class="metricas__top">
        <svg class="metricas__icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/>
        </svg>
        <span class="metricas__numero">
          {{ mostrandoActivos ? activos : inactivos }}
        </span>
      </div>
      <span class="metricas__label">
        {{ mostrandoActivos ? 'Activos' : 'Inactivos' }}
      </span>
    </div>
    <button
      class="metricas__filter-btn"
      (click)="toggleActivos()"
      [title]="mostrandoActivos ? 'Ver inactivos' : 'Ver activos'"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M3 6h18M7 12h10M11 18h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

</div>
