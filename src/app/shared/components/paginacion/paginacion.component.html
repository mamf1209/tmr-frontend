<div class="paginacion">

  <span class="paginacion__info">
    Mostrando registros del {{ registroInicio }} al {{ registroFin }}
  </span>

  <div class="paginacion__controles">

    <!-- Página X de XX al lado izquierdo -->
    <span class="paginacion__pagina-info">
      Página <strong>{{ paginaActual }}</strong> de {{ totalPaginas }}
    </span>

    <button class="paginacion__btn"
      [class.paginacion__btn--disabled]="paginaActual === 1"
      (click)="primera()" [disabled]="paginaActual === 1">
      <span class="material-icons">keyboard_double_arrow_left</span>
    </button>

    <button class="paginacion__btn"
      [class.paginacion__btn--disabled]="paginaActual === 1"
      (click)="anterior()" [disabled]="paginaActual === 1">
      <span class="material-icons">chevron_left</span>
    </button>

    @for (pagina of paginas; track $index) {
      @if (pagina === '...') {
        <span class="paginacion__dots">...</span>
      } @else {
        <button class="paginacion__btn paginacion__btn--numero"
          [class.paginacion__btn--activo]="pagina === paginaActual"
          (click)="irA(pagina)">
          {{ pagina }}
        </button>
      }
    }

    <button class="paginacion__btn"
      [class.paginacion__btn--disabled]="paginaActual === totalPaginas"
      (click)="siguiente()" [disabled]="paginaActual === totalPaginas">
      <span class="material-icons">chevron_right</span>
    </button>

    <button class="paginacion__btn"
      [class.paginacion__btn--disabled]="paginaActual === totalPaginas"
      (click)="ultima()" [disabled]="paginaActual === totalPaginas">
      <span class="material-icons">keyboard_double_arrow_right</span>
    </button>

  </div>
</div>
